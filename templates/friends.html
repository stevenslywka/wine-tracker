<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wine Tracker — Friends</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a0a00; color: #f5e6d3; }
    .navbar { background: #3d0f0f !important; }
    .navbar-brand { color: #c9a96e !important; font-size: 1.4rem; font-weight: bold; }
    a { color: #c9a96e; } a:hover { color: #e8c98a; }
    .btn-wine { background: #8b1a1a; border-color: #8b1a1a; color: #f5e6d3; }
    .btn-wine:hover { background: #a52020; color: #fff; border-color: #a52020; }

    .cellar-card {
      background: #2a1200;
      border: 1px solid #5a2d0c;
      border-radius: 12px;
      padding: 1.5rem;
      text-decoration: none;
      color: #f5e6d3;
      display: block;
      transition: border-color 0.15s, transform 0.15s;
    }
    .cellar-card:hover {
      border-color: #c9a96e;
      transform: translateY(-2px);
      color: #f5e6d3;
    }
    .cellar-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #3d0f0f;
      border: 2px solid #5a2d0c;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .cellar-name { font-size: 1.1rem; font-weight: bold; color: #c9a96e; }
    .cellar-username { font-size: 0.82rem; color: #a07850; }
    .cellar-stat { font-size: 0.88rem; color: #a07850; }
    .cellar-stat strong { color: #f5e6d3; }
    .page-title { color: #c9a96e; font-size: 1.5rem; font-weight: bold; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg mb-4">
    <div class="container d-flex justify-content-between align-items-center">
      <span class="navbar-brand">🍷 Wine Tracker</span>
      <div class="d-flex gap-2 align-items-center">
        <span style="color:#a07850;font-size:0.9rem;">{{ session.display_name }}</span>
        <a href="{{ url_for('home') }}" class="btn btn-sm" style="background:#3d0f0f;border:1px solid #5a2d0c;color:#c9a96e;">← Home</a>
        <a href="{{ url_for('logout') }}" class="btn btn-sm" style="background:#3d0f0f;border:1px solid #5a2d0c;color:#c9a96e;">Log out</a>
      </div>
    </div>
  </nav>

  <div class="container" style="max-width:900px;">
    <div class="page-title mb-4">Friends</div>

    {% if users %}
    <div class="row g-3">
      {% for u in users %}
      {% set stats = user_stats[u.id] %}
      <div class="col-md-6 col-lg-4">
        <a href="{{ url_for('cellar', username=u.username) }}" class="cellar-card">
          <div class="d-flex align-items-center gap-3 mb-3">
            <div class="cellar-avatar">🍷</div>
            <div>
              <div class="cellar-name">{{ u.display_name }}</div>
              <div class="cellar-username">@{{ u.username }}</div>
            </div>
          </div>
          <div class="d-flex gap-3">
            <div class="cellar-stat"><strong>{{ stats.in_cellar }}</strong> in cellar</div>
            <div class="cellar-stat"><strong>{{ stats.total }}</strong> total</div>
          </div>
        </a>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <p style="color:#a07850;">No other users yet.</p>
    {% endif %}
  </div>
</body>
</html>
