<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wine Tracker — Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a0a00; color: #f5e6d3; }
    .navbar { background: #3d0f0f !important; }
    .navbar-brand { color: #c9a96e !important; font-size: 1.4rem; font-weight: bold; }
    a { color: #c9a96e; } a:hover { color: #e8c98a; }

    .home-card {
      background: #2a1200;
      border: 1px solid #5a2d0c;
      border-radius: 14px;
      padding: 2.5rem 2rem;
      text-decoration: none;
      color: #f5e6d3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      transition: border-color 0.15s, transform 0.15s;
      text-align: center;
    }
    .home-card:hover {
      border-color: #c9a96e;
      transform: translateY(-3px);
      color: #f5e6d3;
    }
    .home-card .card-icon { font-size: 3rem; }
    .home-card .card-title { font-size: 1.4rem; font-weight: bold; color: #c9a96e; }
    .home-card .card-subtitle { font-size: 0.9rem; color: #a07850; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg mb-5">
    <div class="container d-flex justify-content-between align-items-center">
      <span class="navbar-brand">🍷 Wine Tracker</span>
      <div class="d-flex gap-2 align-items-center">
        <span style="color:#a07850;font-size:0.9rem;">{{ session.display_name }}</span>
        {% if session.is_admin %}
        <a href="{{ url_for('admin') }}" class="btn btn-sm" style="background:#3d0f0f;border:1px solid #5a2d0c;color:#c9a96e;">Admin</a>
        {% endif %}
        <a href="{{ url_for('logout') }}" class="btn btn-sm" style="background:#3d0f0f;border:1px solid #5a2d0c;color:#c9a96e;">Log out</a>
      </div>
    </div>
  </nav>

  <div class="container" style="max-width:600px;">
    <div class="row g-4">
      <div class="col-12 col-sm-6">
        <a href="{{ url_for('cellar', username=session.username) }}" class="home-card">
          <div class="card-icon">🍾</div>
          <div class="card-title">My Cellar</div>
          <div class="card-subtitle">{{ my_stats.in_cellar }} bottles in cellar &middot; {{ my_stats.total }} total</div>
        </a>
      </div>
      <div class="col-12 col-sm-6">
        <a href="{{ url_for('friends') }}" class="home-card">
          <div class="card-icon">👥</div>
          <div class="card-title">Friends</div>
          <div class="card-subtitle">See other cellars</div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
