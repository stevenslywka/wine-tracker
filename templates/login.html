<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Steven's Wine Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #1a0a00;
      color: #f5e6d3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #2a1200;
      border: 1px solid #5a2d0c;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .login-title {
      color: #c9a96e;
      font-size: 1.6rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 0.25rem;
    }
    .login-subtitle {
      color: #a07850;
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .form-label {
      color: #c9a96e;
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
    }
    .form-control {
      background: #1a0a00;
      border: 1px solid #5a2d0c;
      color: #f5e6d3;
      border-radius: 6px;
      padding: 0.55rem 0.85rem;
    }
    .form-control:focus {
      background: #1a0a00;
      border-color: #c9a96e;
      color: #f5e6d3;
      box-shadow: 0 0 0 0.2rem rgba(201,169,110,0.25);
    }
    .form-control::placeholder {
      color: #6a4a2a;
    }
    .btn-login {
      background: #8b1a1a;
      border: none;
      color: #f5e6d3;
      width: 100%;
      padding: 0.6rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }
    .btn-login:hover {
      background: #a52020;
      color: #fff;
    }
    .error-msg {
      background: #3d0f0f;
      border: 1px solid #8b1a1a;
      color: #f5a0a0;
      border-radius: 6px;
      padding: 0.5rem 0.85rem;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      text-align: center;
    }
    .wine-icon {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="wine-icon">🍷</div>
    <div class="login-title">Steven's Wine Tracker</div>
    <div class="login-subtitle">Enter your password to continue</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}">
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          placeholder="Enter password"
          autofocus
          autocomplete="current-password"
        >
      </div>
      <button type="submit" class="btn btn-login">Sign In</button>
    </form>
  </div>
</body>
</html>
